name: CI Pipeline

on:
push:
branches: ["main"]
pull_request:
branches: ["main"]

jobs:
backend:
runs-on: ubuntu-latest

steps:
  - uses: actions/checkout@v4

  - uses: actions/setup-python@v5
    with:
      python-version: "3.11"

  - run: |
      cd Testing/Backend
      pip install -r requirements.txt

  - run: |
      cd Testing/Backend
      pytest

frontend:
runs-on: ubuntu-latest

steps:
  - uses: actions/checkout@v4

  - uses: actions/setup-node@v4
    with:
      node-version: "20"

  - run: |
      cd Testing/Frontend
      npm install

  - run: |
      cd Testing/Frontend
      npx vitest run
